<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tag Mania</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <div id="login-screen">
        <h1>Tag Mania</h1>
        <div class="input-group">
            <input type="text" id="username-input" placeholder="Enter Username" maxlength="12">
        </div>
        <div class="input-group" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
            <label style="color: white; font-weight: bold; font-size: 16px; margin: 0;">Pick Color:</label>
            <input type="color" id="color-picker" value="#007bff">
        </div>
        <button id="start-btn">Join Game</button>
    </div>

    <div id="game-container" style="display: none;">
        <div id="status-box">Connecting to server...</div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="joystick-zone">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
