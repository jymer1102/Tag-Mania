<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tag Mania</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="icon" sizes="192x192" href="favicon.png">

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Redesigned Menu Container */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1e1e1e;
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #333;
            width: 90%;
            max-width: 340px;
            text-align: center;
        }
        
        /* Neon/Retro Header Style */
        #login-screen h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #007bff, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        
        /* Polished Input Styling */
        #login-screen input[type="text"] {
            margin: 8px 0 18px 0;
            padding: 14px;
            font-size: 16px;
            width: 100%;
            border-radius: 8px;
            border: 2px solid #333;
            background: #2a2a2a;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        #login-screen input[type="text"]:focus {
            border-color: #007bff;
        }
        
        /* Modernized Custom Color Picker Input */
        #login-screen label {
            font-size: 14px;
            color: #aaa;
            font-weight: 600;
            text-align: left;
            width: 100%;
            display: block;
            margin-bottom: 6px;
        }
        #login-screen input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 44px;
            border-radius: 8px;
            cursor: pointer;
            background: none;
            margin-bottom: 24px;
        }
        #login-screen input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        #login-screen input[type="color"]::-webkit-color-swatch {
            border: 2px solid #333;
            border-radius: 8px;
        }

        /* Clean High-Contrast Action Button */
        #login-screen button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 0.5px;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
            transition: all 0.2s ease;
        }
        #login-screen button:hover {
            background: #0056b3;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 123, 255, 0.4);
        }
        #login-screen button:active {
            transform: translateY(1px);
        }

        /* Gameplay Structural Styling */
        #game-container {
            display: none;
            position: relative;
            text-align: center;
        }
        canvas {
            border: 4px solid #333;
            border-radius: 8px;
            display: block;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        #status-box {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
            border: 1px solid #444;
            z-index: 10;
            white-space: nowrap;
        }
        #notification-box {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 123, 255, 0.9);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
        }
        #joystick-zone {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            touch-action: none;
            z-index: 5;
        }
        #joystick-stick {
            width: 42px;
            height: 42px;
            background: #007bff;
            border-radius: 50%;
            position: absolute;
            top: 29px;
            left: 29px;
            box-shadow: 0 4px 10px rgba(0,123,255,0.4);
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Tag Mania</h1>
        
        <label for="username-input">PLAYER NAME</label>
        <input type="text" id="username-input" placeholder="Enter name..." maxlength="12" autocomplete="off">
        
        <label for="color-picker">AVATAR COLOR</label>
        <input type="color" id="color-picker" value="#007bff">
        
        <button id="start-btn">JOIN ARENA</button>
    </div>

    <div id="game-container">
        <div id="status-box">Connecting to server...</div>
        <div id="notification-box"></div>
        <canvas id="gameCanvas"></canvas>
        <div id="joystick-zone">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
