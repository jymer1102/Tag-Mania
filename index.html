<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tag Mania Multiplayer</title>
    <link rel="stylesheet" href="frontend/css/style.css">
</head>
<body>

    <div id="login-screen">
        <div class="logo-container">
            <h1 class="game-title">TAG MANIA</h1>
            <p class="game-subtitle">Fast-Paced Multiplayer Arena</p>
        </div>
        
        <div class="form-group">
            <label for="username-input">Player Handle</label>
            <input type="text" id="username-input" placeholder="Enter username..." maxlength="12">
        </div>
        
        <div class="form-group">
            <label for="color-picker">Avatar Cosmetics</label>
            <div class="color-picker-wrapper">
                <input type="color" id="color-picker" value="#007bff">
                <span class="color-label">Click to choose color</span>
            </div>
        </div>
        
        <button id="start-btn">ENTER ARENA</button>
        <div id="status-box">Connecting to server...</div>
    </div>

    <div id="game-container" style="display: none;">
        <div id="notification-box"></div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="joystick-zone">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="frontend/js/game.js"></script>
</body>
</html>
