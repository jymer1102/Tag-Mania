<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tag Mania</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="icon" sizes="192x192" href="favicon.png">

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // FOOL-PROOF INTERCEPTOR: Captures the exact socket instance game.js creates
        let gameSocket = null;
        const originalIo = window.io;
        window.io = function(...args) {
            const instance = originalIo(...args);
            gameSocket = instance;
            return instance;
        };
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d0d11;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(30, 30, 38, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.2), inset 0 0 15px rgba(255,255,255,0.05);
            border: 2px solid #007bff;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        
        #login-screen h1 {
            font-size: 2.6rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #007bff, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 123, 255, 0.4);
        }

        .server-status-wrapper {
            font-size: 13px;
            color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
            padding: 4px 12px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 193, 7, 0.2);
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        #login-screen label {
            font-size: 12px;
            color: #8c8c9e;
            font-weight: 700;
            text-align: left;
            width: 100%;
            display: block;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        #login-screen input[type="text"] {
            margin-bottom: 20px;
            padding: 14px;
            font-size: 16px;
            width: 100%;
            border-radius: 10px;
            border: 2px solid #323242;
            background: #181822;
            color: #fff;
            outline: none;
            transition: all 0.2s ease;
        }
        #login-screen input[type="text"]:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }
        
        #login-screen input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 48px;
            border-radius: 10px;
            cursor: pointer;
            background: none;
            margin-bottom: 28px;
        }
        #login-screen input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        #login-screen input[type="color"]::-webkit-color-swatch {
            border: 2px solid #323242;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #login-screen button {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: #fff;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
            transition: all 0.2s ease;
        }
        #login-screen button:hover {
            background: linear-gradient(135deg, #0056b3, #004085);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.6);
        }
        #login-screen button:disabled {
            background: #2a2a35;
            color: #5a5a6a;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #game-container {
            display: none !important; 
            position: relative;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 70px; 
        }
        canvas {
            border: 4px solid #1e1e24;
            border-radius: 12px;
            display: block;
            box-shadow: 0 12px 36px rgba(0,0,0,0.7);
        }
        
        #notification-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 123, 255, 0.95);
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        #status-box {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(13, 13, 17, 0.9);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #323242;
            z-index: 10;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #joystick-zone {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 50%;
            touch-action: none;
            z-index: 5;
            margin-top: 25px; 
        }
        #joystick-stick {
            width: 42px;
            height: 42px;
            background: #007bff;
            border-radius: 50%;
            position: absolute;
            top: 29px;
            left: 29px;
            box-shadow: 0 4px 12px rgba(0,123,255,0.5);
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Tag Mania</h1>
        <div class="server-status-wrapper" id="menu-status-label">⚡ CONNECTING TO ARENA SERVER...</div>
        
        <label for="username-input">CHOOSE PLAYER USERNAME</label>
        <input type="text" id="username-input" placeholder="Enter player name..." maxlength="12" autocomplete="off">
        
        <label for="color-picker">CUSTOM IN-GAME AVATAR COLOR</label>
        <input type="color" id="color-picker" value="#007bff">
        
        <button id="start-btn" disabled>Waiting for Server...</button>
    </div>

    <div id="game-container">
        <div id="notification-box"></div>
        <div id="status-box">Connecting...</div>
        <canvas id="gameCanvas"></canvas>
        <div id="joystick-zone">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <script src="game.js"></script>
    
    <script>
        let isReadyToJoin = false;

        document.getElementById('start-btn').addEventListener('click', (e) => {
            if (!isReadyToJoin) {
                e.preventDefault();
                return false;
            }
            clearInterval(statusCheckInterval);
            document.getElementById('login-screen').style.setProperty('display', 'none', 'important');
            document.getElementById('game-container').style.setProperty('display', 'flex', 'important');
        });

        // Loop checks the REAL status of your game's connection pipeline directly
        const statusCheckInterval = setInterval(() => {
            const startBtn = document.getElementById('start-btn');
            const menuStatus = document.getElementById('menu-status-label');
            
            if (!startBtn || !menuStatus) return;

            let isConnected = false;

            // Read directly from the intercepted game connection instance
            if (gameSocket) {
                if (gameSocket.connected || (gameSocket.io && gameSocket.io.readyState === 'open')) {
                    isConnected = true;
                }
            }

            if (isConnected) {
                isReadyToJoin = true;
                startBtn.removeAttribute('disabled');
                if(startBtn.innerText === "Waiting for Server...") startBtn.innerText = "Join Arena";
                
                menuStatus.innerText = "🟢 SERVER READY";
                menuStatus.style.color = "#00ffcc";
                menuStatus.style.background = "rgba(0, 255, 204, 0.1)";
                menuStatus.style.borderColor = "rgba(0, 255, 204, 0.3)";
            } else {
                isReadyToJoin = false;
                startBtn.setAttribute('disabled', 'true');
                startBtn.innerText = "Waiting for Server...";
                
                menuStatus.innerText = "⚡ CONNECTING TO ARENA SERVER...";
                menuStatus.style.color = "#ffc107";
                menuStatus.style.background = "rgba(255, 193, 7, 0.1)";
                menuStatus.style.borderColor = "rgba(255, 193, 7, 0.3)";
                
                // If game socket failed its initial handshake, force it to try again immediately
                if (gameSocket && !gameSocket.connected && typeof gameSocket.connect === 'function') {
                    gameSocket.connect();
                }
            }
        }, 500);
    </script>
</body>
</html>
