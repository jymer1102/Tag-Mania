<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tag Mania Multiplayer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="alert-banner-container"></div>

    <div id="login-screen">
        <div class="card">
            <h1>TAG MANIA</h1>
            <div id="status-box">Connecting to network...</div>
            
            <input type="text" id="username-input" placeholder="Your Name" maxlength="12">
            
            <div class="picker-row">
                <label for="color-picker">Avatar Color:</label>
                <input type="color" id="color-picker" value="#ff5722">
            </div>
            
            <button id="start-btn">Join Arena</button>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <canvas id="gameCanvas"></canvas>
        <div id="joystick-zone">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
