<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Mania</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="login-screen">
        <h1>TAG MANIA</h1>
        <div id="status-box">Connecting to server...</div>
        
        <input type="text" id="username-input" placeholder="Enter Username" maxlength="12">
        
        <div style="margin: 15px 0;">
            <label for="color-picker" style="color: white; margin-right: 10px;">Choose Color:</label>
            <input type="color" id="color-picker" value="#007bff">
        </div>
        
        <button id="start-btn">Join Game</button>
    </div>

    <div id="game-container" style="display: none;">
        <canvas id="gameCanvas"></canvas>
        
        <div id="joystick-zone">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
