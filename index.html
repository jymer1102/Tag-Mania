<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tag Mania</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="icon" sizes="192x192" href="favicon.png">

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #222;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #login-screen h1 {
            margin-bottom: 20px;
        }
        #login-screen input, #login-screen button {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            width: 200px;
            border-radius: 4px;
            border: 1px solid #444;
        }
        #login-screen input[type="text"] {
            background: #333;
            color: #fff;
        }
        #login-screen button {
            background: #007bff;
            color: #fff;
            cursor: pointer;
            border: none;
        }
        #login-screen button:hover {
            background: #0056b3;
        }
        #game-container {
            display: none;
            position: relative;
            text-align: center;
        }
        canvas {
            border: 2px solid #fff;
            display: block;
        }
        #status-box {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 16px;
            z-index: 10;
        }
        #notification-box {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 123, 255, 0.8);
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
        }
        #joystick-zone {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            touch-action: none;
            z-index: 5;
        }
        #joystick-stick {
            width: 40px;
            height: 40px;
            background: #007bff;
            border-radius: 50%;
            position: absolute;
            top: 30px;
            left: 30px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Tag Mania</h1>
        <input type="text" id="username-input" placeholder="Username" maxlength="12">
        <label for="color-picker" style="margin-top:10px;">Select Color:</label>
        <input type="color" id="color-picker" value="#007bff">
        <button id="start-btn">Join Game</button>
    </div>

    <div id="game-container">
        <div id="status-box">Connecting...</div>
        <div id="notification-box"></div>
        <canvas id="gameCanvas"></canvas>
        <div id="joystick-zone">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
